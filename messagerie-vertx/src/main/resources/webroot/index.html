<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Chat Vert.x</title>
    <!-- Bibliothèques nécessaires pour SockJS et l'EventBus Vert.x -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vertx3-eventbus-client@3.9.4/vertx-eventbus.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            padding: 20px;
            background-color: #fafafa;
        }

        h1 {
            color: #333;
        }

        #chat {
            border: 1px solid #ccc;
            height: 400px;
            width: 100%;
            max-width: 600px;
            overflow-y: scroll;
            padding: 10px;
            margin-bottom: 20px;
            background: #fff;
        }

        .message {
            margin-bottom: 8px;
            border-bottom: 1px solid #eee;
            padding-bottom: 4px;
        }

        .username {
            font-weight: bold;
            color: #007bff;
        }

        .controls {
            display: flex;
            gap: 10px;
            max-width: 600px;
        }

        input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        #user_name {
            width: 100px;
        }

        #content {
            flex-grow: 1;
        }

        button {
            padding: 8px 15px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }
    </style>
</head>

<body>
    <h1>Messagerie Vert.x</h1>

    <div id="chat"></div>

    <div class="controls">
        <input type="text" id="user_name" placeholder="Pseudo">
        <input type="text" id="content" placeholder="Votre message...">
        <button onclick="send()">Envoyer</button>
    </div>

    <script>
        const chatElement = document.getElementById('chat');

        // Ajoute un message visuellement dans la liste
        function appendMessage(msg) {
            const div = document.createElement('div');
            div.className = 'message';
            // Handles both JSON formats: lower-case from POST or upper-case from HSQLDB query
            const userName = msg.user_name || msg.USER_NAME || 'Anonyme';
            const content = msg.content || msg.CONTENT || '...';
            div.innerHTML = `<span class="username">${userName}</span> : ${content}`;
            chatElement.appendChild(div);
            chatElement.scrollTop = chatElement.scrollHeight; // Scroll auto en bas
        }

        // 1. Charger les 20 derniers messages au démarrage
        fetch('/api/messages')
            .then(response => response.json())
            .then(messages => {
                // On les affiche dans le bon ordre (les plus anciens d'abord en haut)
                messages.reverse().forEach(appendMessage);
            })
            .catch(err => console.error("Erreur chargement messages:", err));

        // 2. Mise à jour "temps réel" via Polling (Fallback car SockJS bridge est instable)
        setInterval(() => {
            fetch('/api/messages')
                .then(response => response.json())
                .then(messages => {
                    // On efface et on réaffiche tout pour la simplicité (Mandatory only)
                    chatElement.innerHTML = '';
                    messages.reverse().forEach(appendMessage);
                })
                .catch(err => console.error("Erreur polling:", err));
        }, 2000);

        // 3. Envoi de message via l'API REST
        function send() {
            const user_name = document.getElementById('user_name').value;
            const content = document.getElementById('content').value;

            if (!user_name || !content) {
                alert("Veuillez remplir le pseudo et le message !");
                return;
            }

            const payload = { user_name, content };

            fetch('/api/messages', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(res => {
                if (res.ok) {
                    appendMessage(payload); // Affichage immédiat pour l'expéditeur
                    document.getElementById('content').value = ''; // On vide le champ message
                }
            }).catch(err => console.error("Erreur envoi:", err));
        }

        // Permet d'envoyer avec la touche Entrée
        document.getElementById('content').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') send();
        });
    </script>
</body>

</html>
